<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- 白色背景矩形 -->
  <rect width="256" height="256" rx="64" fill="white" />
  
  <g transform="translate(0, 7)">
    <!-- 立方体轮廓线 - 调整为更深的接近黑色的紫色 -->
    <path d="M128 50L190 85V155L128 190L66 155V85L128 50Z" 
          stroke="#2a0e5c" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.9" 
          fill="none" />
    
    <!-- 立方体内部连接线 - 调整为更深的接近黑色的紫色 -->
    <path d="M128 120L190 85" 
          stroke="#2a0e5c" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.7" />
    
    <path d="M128 120L66 85" 
          stroke="#2a0e5c" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.7" />
    
    <path d="M128 120V190" 
          stroke="#2a0e5c" 
          stroke-width="12" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          opacity="0.7" />
    
    <!-- 中心点 - 调整为更深的接近黑色的紫色 -->
    <circle cx="128" cy="120" r="8" fill="#2a0e5c" />
  </g>
</svg>