name: Desktop Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            rid: win-x64
            target_name: Windows x64
            archive_ext: zip
          - os: windows-latest
            rid: win-arm64
            target_name: Windows ARM64
            archive_ext: zip

          # Linux
          - os: ubuntu-latest
            rid: linux-x64
            target_name: Linux x64
            archive_ext: tar.gz
          - os: ubuntu-latest
            rid: linux-arm
            target_name: Linux ARMv7
            archive_ext: tar.gz
          - os: ubuntu-latest
            rid: linux-arm64
            target_name: Linux ARM64
            archive_ext: tar.gz

          # macOS
          - os: macos-latest
            rid: osx-x64
            target_name: macOS Intel
            archive_ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            target_name: macOS Apple Silicon
            archive_ext: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Linux x64 依赖
      - name: Install Linux dependencies (x64)
        if: matrix.os == 'ubuntu-latest' && matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      # Linux ARMv7 交叉编译依赖
      - name: Install Linux dependencies (ARMv7)
        if: matrix.os == 'ubuntu-latest' && matrix.rid == 'linux-arm'
        run: |
          sudo dpkg --add-architecture armhf
          sudo sed -i 's/^deb/deb [arch=amd64]/g' /etc/apt/sources.list
          sudo bash -c 'cat > /etc/apt/sources.list.d/armhf.list << EOF
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-backports main restricted universe multiverse
          deb [arch=armhf] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF'
          sudo apt-get update
          sudo apt-get install -y clang gcc-arm-linux-gnueabihf zlib1g-dev:armhf

      # Linux ARM64 交叉编译依赖
      - name: Install Linux dependencies (ARM64)
        if: matrix.os == 'ubuntu-latest' && matrix.rid == 'linux-arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb/deb [arch=amd64]/g' /etc/apt/sources.list
          sudo bash -c 'cat > /etc/apt/sources.list.d/arm64.list << EOF
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-backports main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF'
          sudo apt-get update
          sudo apt-get install -y clang gcc-aarch64-linux-gnu zlib1g-dev:arm64

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # 如果不需要前端构建，可以注释掉以下步骤
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Publish Native AOT
        run: dotnet publish Navigation/Navigation.csproj -c Release -r ${{ matrix.rid }} -o publish_output

      # Windows 打包
      - name: Archive production artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path publish_output\* -DestinationPath Navigation-${{ matrix.rid }}.zip

      # Linux/macOS 打包
      - name: Archive production artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: tar -czvf Navigation-${{ matrix.rid }}.tar.gz -C publish_output .

      # 上传构建产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Navigation-${{ matrix.rid }}
          path: Navigation-${{ matrix.rid }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          generate_release_notes: true # 自动生成发布说明
          draft: false # 直接发布，不存为草稿
          prerelease: ${{ contains(github.ref, '-') }} # 如果tag包含-，则标记为预发布
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
