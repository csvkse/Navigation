name: Desktop Release

on:
  push:
    tags:
      - "v*" # 当推送形如 v1.0.0 的 tag 时自动触发打包并发布 Release
  workflow_dispatch: # 允许在 GitHub Actions 面板手动点击运行
    inputs:
      build_all:
        description: "构建所有平台"
        required: true
        default: false
        type: boolean
      platform:
        description: "选择构建平台（当不构建所有平台时）"
        required: true
        default: "linux-x64"
        type: choice
        options:
          - linux-x64
          - linux-arm64
          - win-x64
          - win-arm64
          - osx-arm64
          - osx-x64

jobs:
  # 准备阶段：根据触发方式动态生成构建矩阵
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        run: |
          # 定义全平台构建矩阵
          FULL_MATRIX='{"include":[
            {"os":"windows-latest","rid":"win-x64","target_name":"Windows x64","archive_ext":"zip"},
            {"os":"windows-latest","rid":"win-arm64","target_name":"Windows ARM64","archive_ext":"zip"},
            {"os":"ubuntu-latest","rid":"linux-x64","target_name":"Linux x64","archive_ext":"tar.gz"},
            {"os":"ubuntu-24.04-arm","rid":"linux-arm64","target_name":"Linux ARM64","archive_ext":"tar.gz"},
            {"os":"macos-latest","rid":"osx-arm64","target_name":"macOS Apple Silicon","archive_ext":"tar.gz"},
            {"os":"macos-13","rid":"osx-x64","target_name":"macOS Intel","archive_ext":"tar.gz"}
          ]}'

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发：根据用户选择决定构建内容
            if [ "${{ github.event.inputs.build_all }}" = "true" ]; then
              # 用户选择构建所有平台
              echo "matrix=${FULL_MATRIX}" >> $GITHUB_OUTPUT
              echo "构建所有平台"
            else
              # 用户选择单个平台
              case "${{ github.event.inputs.platform }}" in
                "linux-x64")
                  echo 'matrix={"include":[{"os":"ubuntu-latest","rid":"linux-x64","target_name":"Linux x64","archive_ext":"tar.gz"}]}' >> $GITHUB_OUTPUT
                  echo "构建 Linux x64"
                  ;;
                "linux-arm64")
                  echo 'matrix={"include":[{"os":"ubuntu-24.04-arm","rid":"linux-arm64","target_name":"Linux ARM64","archive_ext":"tar.gz"}]}' >> $GITHUB_OUTPUT
                  echo "构建 Linux ARM64"
                  ;;
                "win-x64")
                  echo 'matrix={"include":[{"os":"windows-latest","rid":"win-x64","target_name":"Windows x64","archive_ext":"zip"}]}' >> $GITHUB_OUTPUT
                  echo "构建 Windows x64"
                  ;;
                "win-arm64")
                  echo 'matrix={"include":[{"os":"windows-latest","rid":"win-arm64","target_name":"Windows ARM64","archive_ext":"zip"}]}' >> $GITHUB_OUTPUT
                  echo "构建 Windows ARM64"
                  ;;
                "osx-arm64")
                  echo 'matrix={"include":[{"os":"macos-latest","rid":"osx-arm64","target_name":"macOS Apple Silicon","archive_ext":"tar.gz"}]}' >> $GITHUB_OUTPUT
                  echo "构建 macOS Apple Silicon"
                  ;;
                "osx-x64")
                  echo 'matrix={"include":[{"os":"macos-13","rid":"osx-x64","target_name":"macOS Intel","archive_ext":"tar.gz"}]}' >> $GITHUB_OUTPUT
                  echo "构建 macOS Intel"
                  ;;
              esac
            fi
          else
            # Tag 推送：构建所有平台（全量发布）
            echo "matrix=${FULL_MATRIX}" >> $GITHUB_OUTPUT
            echo "标签推送，构建所有平台"
          fi

  build:
    name: Build ${{ matrix.target_name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Linux x64 平台下的 NativeAOT 依赖包
      - name: Install Linux dependencies (x64)
        if: matrix.os == 'ubuntu-latest' && matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      # Linux ARM64 原生编译依赖包
      - name: Install Linux dependencies (ARM64 Native)
        if: matrix.os == 'ubuntu-24.04-arm' && matrix.rid == 'linux-arm64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      # macOS 依赖（如果需要）
      - name: Install macOS dependencies
        if: startsWith(matrix.os, 'macos-')
        run: |
          if [ "${{ matrix.rid }}" = "osx-x64" ]; then
            # Intel Mac 可能需要额外的配置
            echo "Configuring for Intel Mac"
          fi
          brew install --cask osxfuse || true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@8

      # 执行发布工作 (开启 PublishAot=true 将编译出本机独立机器码)
      - name: Publish Native AOT
        run: dotnet publish Navigation/Navigation.csproj -c Release -r ${{ matrix.rid }} -o publish_output

      # Windows 打包为 zip
      - name: Archive production artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path publish_output\* -DestinationPath Navigation-${{ matrix.rid }}.zip

      # Linux / macOS 打包为 tar.gz
      - name: Archive production artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: tar -czvf Navigation-${{ matrix.rid }}.tar.gz -C publish_output .

      # 上传构建产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Navigation-${{ matrix.rid }}
          path: Navigation-${{ matrix.rid }}.${{ matrix.archive_ext }}
          retention-days: 7 # 保留7天，足够发布使用

  release:
    needs: build
    runs-on: ubuntu-latest
    # 只有当触发是 Tag 推送时，才会执行正式发布 release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Navigation-*
          merge-multiple: true

      # 验证下载的产物
      - name: List artifacts
        run: |
          echo "下载的产物列表："
          ls -la artifacts/
          echo "产物数量：$(ls -1 artifacts/ | wc -l)"

      # 从 tag 获取版本号
      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # 创建优化的 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          # 自动生成基于 Commit/PR 的更新日志
          generate_release_notes: true
          # 优化 Release 页面的文案展示
          body: |
            # 🎉 Navigation 桌面版 ${{ steps.get_version.outputs.VERSION }} 发布

            本次发布包含适用于各个主要操作系统的原生独立运行程序（Native AOT）。
            **无需安装 .NET 运行时**，下载解压即可直接运行！

            ## 📥 下载指南

            | 平台 | 架构 | 下载链接 | 说明 |
            | :--- | :--- | :--- | :--- |
            | 🪟 Windows | x64 | `Navigation-win-x64.zip` | 适用于绝大多数 Windows 电脑（Intel/AMD 64位） |
            | 🪟 Windows | ARM64 | `Navigation-win-arm64.zip` | 适用于 Windows on ARM 设备（如 Surface Pro X） |
            | 🐧 Linux | x64 | `Navigation-linux-x64.tar.gz` | 适用于绝大多数 Linux 电脑（Intel/AMD 64位） |
            | 🐧 Linux | ARM64 | `Navigation-linux-arm64.tar.gz` | 适用于 ARM64 架构的 Linux 设备 |
            | 🍎 macOS | Apple Silicon | `Navigation-osx-arm64.tar.gz` | 适用于 M1/M2/M3/M4 系列 Mac |
            | 🍎 macOS | Intel | `Navigation-osx-x64.tar.gz` | 适用于 Intel 芯片的 Mac |

            ## 🚀 运行方法

            ### Windows
            ```bash
            # 解压 zip 文件，双击运行 Navigation.exe 即可
