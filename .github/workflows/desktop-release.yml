name: Desktop Release

on:
  push:
    tags:
      - "v*" # 当推送形如 v1.0.0 的 tag 时自动触发打包并发布 Release
  workflow_dispatch: # 允许在 GitHub Actions 面板手动点击运行

jobs:
  build:
    name: Build ${{ matrix.target_name }}
    runs-on: ${{ matrix.os }}
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows
          - os: windows-latest
            rid: win-x64
            target_name: Windows x64
            archive_ext: zip
          - os: windows-latest
            rid: win-arm64
            target_name: Windows ARM64
            archive_ext: zip

          # Linux (只保留 x64)
          - os: ubuntu-latest
            rid: linux-x64
            target_name: Linux x64
            archive_ext: tar.gz
          # Linux ARMv7 和 ARM64 已取消

          # macOS
          - os: macos-latest
            rid: osx-x64
            target_name: macOS Intel
            archive_ext: tar.gz
          - os: macos-latest
            rid: osx-arm64
            target_name: macOS Apple Silicon
            archive_ext: tar.gz

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Linux x64 平台下的 NativeAOT 依赖包
      - name: Install Linux dependencies (x64)
        if: matrix.os == 'ubuntu-latest' && matrix.rid == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang zlib1g-dev

      # Linux ARM 依赖安装步骤已全部移除

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # 如果项目需要前端构建，取消下面的注释
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Build frontend
        run: |
          cd Navigation/ClientApp  # 根据实际路径调整
          pnpm install
          pnpm build

      # 执行 NativeAOT 发布
      - name: Publish Native AOT
        run: dotnet publish Navigation/Navigation.csproj -c Release -r ${{ matrix.rid }} -o publish_output

      # 验证可执行文件（Linux/macOS）
      - name: Test executable (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x publish_output/Navigation
          ./publish_output/Navigation --version || echo "Executable built successfully (--version not supported)"

      # Windows 打包为 zip
      - name: Archive production artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path publish_output\* -DestinationPath Navigation-${{ matrix.rid }}.zip

      # Linux / macOS 打包为 tar.gz
      - name: Archive production artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: tar -czvf Navigation-${{ matrix.rid }}.tar.gz -C publish_output .

      # 上传构建产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Navigation-${{ matrix.rid }}
          path: Navigation-${{ matrix.rid }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    # 只有当触发是 Tag 推送时，才会执行正式发布 release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 创建 GitHub Release，并将打包好的产物全部附加到上面
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
