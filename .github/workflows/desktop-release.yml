name: Desktop Release

on:
  push:
    tags:
      - "v*" # 当推送形如 v1.0.0 的 tag 时自动触发打包并发布 Release
  workflow_dispatch: # 允许在 GitHub Actions 面板手动点击运行

jobs:
  # 准备阶段：根据触发方式动态生成构建矩阵
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Set build matrix
        id: set-matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # 手动触发：仅构建 Linux x64
            echo 'matrix={"include":[{"os":"ubuntu-latest","rid":"linux-x64","target_name":"Linux x64","archive_ext":"tar.gz"}]}' >> $GITHUB_OUTPUT
          else
            # Tag 推送：构建所有平台
            echo 'matrix={"include":[{"os":"windows-latest","rid":"win-x64","target_name":"Windows x64","archive_ext":"zip"},{"os":"windows-latest","rid":"win-arm64","target_name":"Windows ARM64","archive_ext":"zip"},{"os":"ubuntu-latest","rid":"linux-x64","target_name":"Linux x64","archive_ext":"tar.gz"},{"os":"ubuntu-24.04-arm","rid":"linux-arm64","target_name":"Linux ARM64","archive_ext":"tar.gz"},{"os":"macos-latest","rid":"osx-arm64","target_name":"macOS Apple Silicon","archive_ext":"tar.gz"}]}' >> $GITHUB_OUTPUT
          fi

  build:
    name: Build ${{ matrix.target_name }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Linux x64 平台下的 NativeAOT 依赖包
      - name: Install Linux dependencies (x64)
        if: matrix.os == 'ubuntu-latest' && matrix.rid == 'linux-x64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
      # 2. Linux ARM64 原生编译依赖包
      - name: Install Linux dependencies (ARM64 Native)
        if: matrix.os == 'ubuntu-24.04-arm' && matrix.rid == 'linux-arm64'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@8

      # 执行发布工作 (开启 PublishAot=true 将编译出本机独立机器码)
      - name: Publish Native AOT
        run: dotnet publish Navigation/Navigation.csproj -c Release -r ${{ matrix.rid }} -o publish_output

      # Windows 打包为 zip
      - name: Archive production artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path publish_output\* -DestinationPath Navigation-${{ matrix.rid }}.zip

      # Linux / macOS 打包为 tar.gz
      - name: Archive production artifacts (Unix)
        if: matrix.os != 'windows-latest'
        run: tar -czvf Navigation-${{ matrix.rid }}.tar.gz -C publish_output .

      # 上传构建产物
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Navigation-${{ matrix.rid }}
          path: Navigation-${{ matrix.rid }}.${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest
    # 只有当触发是 Tag 推送时，才会执行正式发布 release
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # 创建优化的 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          # 自动生成基于 Commit/PR 的更新日志
          generate_release_notes: true
          # 优化 Release 页面的文案展示
          body: |
            🎉 **Navigation 桌面版更新发布**

            本次发布包含适用于各个主要操作系统的原生独立运行程序（Native AOT）。
            **无需安装 .NET 运行时**，下载解压即可直接运行！

            ### 📦 下载与运行指南

            * **🪟 Windows**: 
                * 下载对应的 `.zip` 文件。
                * 解压后直接双击运行 `Navigation.exe`。
            * **🍎 macOS & 🐧 Linux**: 
                * 下载对应的 `.tar.gz` 文件。
                * 打开终端，解压文件：`tar -xzvf Navigation-*.tar.gz`。
                * 赋予执行权限并运行：`chmod +x Navigation && ./Navigation`。

            ---

            ### 💻 架构选择说明

            | 架构标识 | 适用设备说明 |
            | :--- | :--- |
            | **`x64`** | 适用于绝大多数普通电脑（Intel / AMD 处理器）。 |
            | **`arm64`** | 适用于 Apple Silicon (M1/M2/M3 等 Mac)、Windows on ARM 设备及大部分现代 ARM 架构的 Linux 服务器和高端开发板。 |
            | **`arm`** | 适用于较老的 32 位 ARM Linux 设备（例如老款树莓派）。 |

            ---

            *💡 详细的代码更新日志请参考下方自动生成的 Release Notes 👇*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
